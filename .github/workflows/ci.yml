name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: scribe
          POSTGRES_PASSWORD: scribe
          POSTGRES_DB: scribe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scribe -d scribe_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      SCRIBE_TEST_DATABASE_URL: postgresql+psycopg://scribe:scribe@localhost:5432/scribe_test
      # The test pull doesn't need to talk to real Vast / Chhoto / codex —
      # set empty values so the Settings load.
      SCRIBE_VAST_API_KEY: ""
      SCRIBE_SHORTLINK_API_URL: ""
      SCRIBE_SHORTLINK_API_KEY: ""
      SCRIBE_DATABASE_URL: postgresql+psycopg://scribe:scribe@localhost:5432/scribe_test
      SCRIBE_TEMP_DIR: /tmp/scribe-ci
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build SPA
        working-directory: web/spa
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Sync deps (incl. dev)
        run: uv sync --frozen --all-extras --all-groups

      - name: Ruff (lint)
        run: uv run ruff check src tests

      - name: pytest
        run: uv run pytest -q
        env:
          SCRIBE_LOG_LEVEL: WARNING
