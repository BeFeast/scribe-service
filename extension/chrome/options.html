<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'; style-src 'self'">
    <title>Scribe extension settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Scribe settings</h1>
      <form id="settings-form">
        <label>
          Scribe base URL
          <input id="base-url" name="baseUrl" type="url" required placeholder="https://scribe.oklabs.uk">
        </label>
        <label>
          Optional bearer token
          <input id="bearer-token" name="bearerToken" type="password" autocomplete="off">
          <span class="help">
            Create a Chrome extension token in Scribe Settings, then paste it here.
            It is required for protected Scribe URLs outside trusted LAN.
            The token is stored in this device's local extension storage only —
            it is never cloud-synced.
          </span>
        </label>
        <p id="last-auth" class="help">Never authenticated.</p>
        <div class="actions">
          <button type="submit">Save</button>
          <span id="status" role="status" aria-live="polite"></span>
        </div>
      </form>
      <section id="youtube-cookies">
        <h2>YouTube cookies</h2>
        <p>
          Forward your <code>youtube.com</code> cookies with each submission so Scribe can fetch
          age-gated or member-only videos that <code>yt-dlp</code> cannot reach anonymously.
          Cookies are read fresh on each submit and never stored by the extension.
        </p>
        <div class="actions">
          <button type="button" id="grant-youtube">Enable YouTube cookies</button>
          <button type="button" id="revoke-youtube">Disable</button>
          <span id="youtube-status" role="status" aria-live="polite"></span>
        </div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
