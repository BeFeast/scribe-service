<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Scribe extension settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Scribe settings</h1>
      <form id="settings-form">
        <label>
          Scribe base URL
          <input id="base-url" name="baseUrl" type="url" required placeholder="https://scribe.oklabs.uk">
        </label>
        <label>
          Optional bearer token
          <input id="bearer-token" name="bearerToken" type="password" autocomplete="off">
          <span class="help">
            Required for protected Scribe URLs outside trusted LAN. Leave blank only when the Scribe
            deployment accepts unauthenticated requests.
          </span>
        </label>
        <div class="actions">
          <button type="submit">Save</button>
          <span id="status" role="status" aria-live="polite"></span>
        </div>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
