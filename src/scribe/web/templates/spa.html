<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribe SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;650;700;800&family=Geist+Mono:wght@400;600;700&family=Inter:wght@400;500;650;700;800&family=JetBrains+Mono:wght@400;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,650;6..72,700&display=swap" rel="stylesheet">
    {% for href in styles %}
    <link rel="stylesheet" crossorigin href="{{ href }}">
    {% endfor %}
  </head>
  <body>
    <div id="root"></div>
    {% for src in scripts %}
    <script type="module" crossorigin src="{{ src }}"></script>
    {% endfor %}
  </body>
</html>
