<!doctype html>
<html lang="en" data-variant="field" data-theme="light" data-density="compact" data-library-layout="feed">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Scribe SPA</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#657153">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;650;700;800&family=Geist+Mono:wght@400;600;700&family=Inter:wght@400;500;650;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    {% for href in styles %}
    <link rel="stylesheet" crossorigin href="{{ href }}">
    {% endfor %}
  </head>
  <body>
    <div id="root"></div>
    {% for src in scripts %}
    <script type="module" crossorigin src="{{ src }}"></script>
    {% endfor %}
  </body>
</html>
