<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribe SPA</title>
    {% for href in styles %}
    <link rel="stylesheet" crossorigin href="{{ href }}">
    {% endfor %}
  </head>
  <body>
    <div id="root"></div>
    {% for src in scripts %}
    <script type="module" crossorigin src="{{ src }}"></script>
    {% endfor %}
  </body>
</html>
