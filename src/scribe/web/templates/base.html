<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}scribe{% endblock %}</title>
<link rel="alternate" type="application/rss+xml" title="scribe RSS" href="/feed.xml">
<script>
  // Apply stored theme before paint to avoid a flash of the wrong palette.
  // `localStorage.theme` ∈ {"light","dark"} overrides prefers-color-scheme.
  (function () {
    try {
      var t = localStorage.getItem("theme");
      if (t === "light" || t === "dark") {
        document.documentElement.classList.add("theme-" + t);
      }
    } catch (e) {}
  })();
</script>
<style>
  :root { color-scheme: light dark; --bg:#fff; --fg:#1a1a1a; --link:#2563eb;
          --muted:#6b7280; --border:rgba(0,0,0,.18); --soft:rgba(0,0,0,.06);
          --softer:rgba(0,0,0,.04); }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0d1117; --fg:#e6edf3; --link:#58a6ff; --muted:#8b949e;
            --border:rgba(255,255,255,.18); --soft:rgba(255,255,255,.08);
            --softer:rgba(255,255,255,.04); }
  }
  html.theme-light { color-scheme: light; --bg:#fff; --fg:#1a1a1a; --link:#2563eb;
                     --muted:#6b7280; --border:rgba(0,0,0,.18); --soft:rgba(0,0,0,.06);
                     --softer:rgba(0,0,0,.04); }
  html.theme-dark  { color-scheme: dark;  --bg:#0d1117; --fg:#e6edf3; --link:#58a6ff;
                     --muted:#8b949e; --border:rgba(255,255,255,.18); --soft:rgba(255,255,255,.08);
                     --softer:rgba(255,255,255,.04); }
  body { font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
         max-width: 820px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem;
         background: var(--bg); color: var(--fg); }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { display: flex; align-items: baseline; gap: .75rem; margin-bottom: 1.5rem;
           border-bottom: 1px solid var(--border); padding-bottom: .6rem; }
  header h1 { font-size: 1.1rem; margin: 0; }
  header h1 a { color: inherit; }
  header .sub { color: var(--muted); font-size: .85rem; }
  header .spacer { flex: 1; }
  .theme-toggle { padding: .25rem .55rem; border: 1px solid var(--border); border-radius: 4px;
                  background: transparent; color: inherit; font: inherit; font-size: .9rem;
                  cursor: pointer; line-height: 1; }
  .theme-toggle:hover { background: var(--soft); }
  .theme-toggle .icon-sun { display: inline; }
  .theme-toggle .icon-moon { display: none; }
  @media (prefers-color-scheme: dark) {
    html:not(.theme-light) .theme-toggle .icon-sun { display: none; }
    html:not(.theme-light) .theme-toggle .icon-moon { display: inline; }
  }
  html.theme-dark .theme-toggle .icon-sun { display: none; }
  html.theme-dark .theme-toggle .icon-moon { display: inline; }
  html.theme-light .theme-toggle .icon-sun { display: inline; }
  html.theme-light .theme-toggle .icon-moon { display: none; }
  .filters { display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; }
  .filters input[type=search] { flex: 1; padding: .35rem .55rem; border: 1px solid var(--border);
                                border-radius: 4px; font: inherit; background: transparent; color: inherit; }
  .filters button { padding: .35rem .8rem; border: 1px solid var(--border); border-radius: 4px;
                    background: transparent; color: inherit; font: inherit; cursor: pointer; }
  .filters .reset { font-size: .85rem; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: .45rem .5rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { font-size: .78rem; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); }
  .tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .2rem; }
  .tag { background: var(--soft); border-radius: 4px; padding: .05rem .4rem; font-size: .8rem;
         color: inherit; }
  .tag:hover { background: var(--border); text-decoration: none; }
  .meta { color: var(--muted); font-size: .87rem; margin: .25rem 0 1rem; }
  .meta a { margin-right: .9rem; }
  .muted { color: var(--muted); }
  section { margin-top: 2rem; }
  section > h2 { font-size: .95rem; text-transform: uppercase; letter-spacing: .03em;
                 color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: .3rem; }
  .body { overflow-wrap: break-word; }
  .body pre { background: var(--softer); padding: .75rem; border-radius: 6px; overflow-x: auto; }
  .body code { background: var(--softer); padding: .1rem .3rem; border-radius: 3px; }
  .body pre code { background: none; padding: 0; }
</style>
</head>
<body>
<header>
  <h1><a href="/">scribe</a></h1>
  <span class="sub">{% block subtitle %}{% endblock %}</span>
  <span class="spacer"></span>
  <button type="button" id="theme-toggle" class="theme-toggle"
          aria-label="Toggle dark mode" aria-pressed="" title="Toggle dark mode">
    <span class="icon-sun" aria-hidden="true">☀</span><span class="icon-moon" aria-hidden="true">☾</span>
  </button>
</header>
{% block content %}{% endblock %}
<script>
  // Vanilla toggle: cycles between explicit "light" and "dark" and persists
  // to localStorage so the choice overrides prefers-color-scheme on reload.
  (function () {
    var btn = document.getElementById("theme-toggle");
    if (!btn) return;
    var root = document.documentElement;

    function current() {
      if (root.classList.contains("theme-dark")) return "dark";
      if (root.classList.contains("theme-light")) return "light";
      var mq = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
      return mq && mq.matches ? "dark" : "light";
    }
    function apply(theme) {
      root.classList.remove("theme-light", "theme-dark");
      root.classList.add("theme-" + theme);
      try { localStorage.setItem("theme", theme); } catch (e) {}
      btn.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
    }
    btn.setAttribute("aria-pressed", current() === "dark" ? "true" : "false");
    btn.addEventListener("click", function () {
      apply(current() === "dark" ? "light" : "dark");
    });
  })();
</script>
</body>
</html>
