<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}scribe{% endblock %}</title>
<link rel="alternate" type="application/rss+xml" title="scribe RSS" href="/feed.xml">
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
         max-width: 820px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { display: flex; align-items: baseline; gap: .75rem; margin-bottom: 1.5rem;
           border-bottom: 1px solid #8884; padding-bottom: .6rem; }
  header h1 { font-size: 1.1rem; margin: 0; }
  header .sub { color: #8889; font-size: .85rem; }
  .filters { display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; }
  .filters input[type=search] { flex: 1; padding: .35rem .55rem; border: 1px solid #8884;
                                border-radius: 4px; font: inherit; background: transparent; color: inherit; }
  .filters button { padding: .35rem .8rem; border: 1px solid #8884; border-radius: 4px;
                    background: transparent; color: inherit; font: inherit; cursor: pointer; }
  .filters .reset { font-size: .85rem; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: .45rem .5rem; border-bottom: 1px solid #8883; vertical-align: top; }
  th { font-size: .78rem; text-transform: uppercase; letter-spacing: .03em; color: #8889; }
  .tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .2rem; }
  .tag { background: #8882; border-radius: 4px; padding: .05rem .4rem; font-size: .8rem;
         color: inherit; }
  .tag:hover { background: #8884; text-decoration: none; }
  .meta { color: #8889; font-size: .87rem; margin: .25rem 0 1rem; }
  .meta a { margin-right: .9rem; }
  .muted { color: #8889; }
  section { margin-top: 2rem; }
  section > h2 { font-size: .95rem; text-transform: uppercase; letter-spacing: .03em;
                 color: #8889; border-bottom: 1px solid #8883; padding-bottom: .3rem; }
  .body { overflow-wrap: break-word; }
  .body pre { background: #8881; padding: .75rem; border-radius: 6px; overflow-x: auto; }
  .body code { background: #8881; padding: .1rem .3rem; border-radius: 3px; }
  .body pre code { background: none; padding: 0; }
</style>
</head>
<body>
<header>
  <h1><a href="/">scribe</a></h1>
  <span class="sub">{% block subtitle %}{% endblock %}</span>
</header>
{% block content %}{% endblock %}
</body>
</html>
